---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secret-agent
  namespace: flux-system
spec:
  interval: 1m
  path: ./secret-agent
  prune: true
  sourceRef:
    kind: GitRepository
    name: ping-infra
    namespace: flux-system
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ping-secrets
  namespace: flux-system
spec:
  interval: 1m
  path: ./ping-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: ping-infra
    namespace: flux-system
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: ingress-nginx
    - name: secret-agent
