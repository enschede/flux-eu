apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ping-platform
  namespace: ping-platform
spec:
  interval: 1m
  chart:
    spec:
      chart: identity-platform
      version: "2026.2.1"
      sourceRef:
        kind: HelmRepository
        name: forgeops
        namespace: flux-system
      interval: 1m

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  valuesFrom:
    - kind: ConfigMap
      name: identity-platform-values
      valuesKey: values.yaml

  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Ingress
              name: am
              namespace: ping-platform
            patch: |
              - op: add
                path: /metadata/annotations/traefik.ingress.kubernetes.io~1service.serversscheme
                value: https
          - target:
              kind: Service
              name: am
              namespace: ping-platform
            patch: |
              - op: replace
              path: /spec/ports/0/name
              value: http
              - op: replace
              path: /spec/ports/0/targetPort
              value: 8081
          - target:
              kind: Ingress
              name: admin-ui
              namespace: ping-platform
            patch: |
              - op: add
                path: /metadata/annotations/traefik.ingress.kubernetes.io~1service.serversscheme
                value: https
