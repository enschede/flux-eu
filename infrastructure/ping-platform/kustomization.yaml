apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: identity-platform-values
    namespace: ping-platform
    files:
      - values.yaml=values.yaml

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - worldofciamnl.enc.yaml
  - amadmin-password.enc.yaml
  - middleware.yaml
