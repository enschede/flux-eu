apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ping-platform

configMapGenerator:
  - name: identity-platform-values
    files:
      - values.yaml=values.yaml

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
