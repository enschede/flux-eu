apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: secret-agent
  namespace: secret-agent
spec:
  interval: 15m

  chartRef:
    kind: OCIRepository
    name: secret-agent
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3