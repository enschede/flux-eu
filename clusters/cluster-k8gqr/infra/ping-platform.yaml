apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ping-platform
  namespace: flux-system
spec:
  interval: 1m
  path: ./infrastructure/ping-platform
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  wait: true
  dependsOn:
    - name: traefik
    - name: cert-manager
    - name: secret-agent
    - name: infra-storage
